<style>
    :root {
      /* PALETA CORES DO SEU CALENDÁRIO */
      --bg-main: #141419;        /* O mesmo fundo grafite escuro */
      --bg-card: #1d1d24;        /* O tom dos cards internos */
      --border-color: #2b2b35;   /* Bordas discretas */
      --text-main: #ffffff;      /* Texto principal branco aceso */
      --text-muted: #9ca3af;     /* Texto secundário cinza */
      
      /* CORES DAS PLATAFORMAS (Para dar o destaque certo) */
      --meta-color: #3b82f6;     /* Azul clássico do Meta Ads */
      --google-color: #f59e0b;   /* Amarelo/Dourado do Google Ads */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 60px; }

    /* CABEÇALHO */
    .header {
      background: #0d0d11;
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo img { height: 35px; }
    .header-title { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; border-left: 2px solid var(--border-color); padding-left: 12px; color: var(--text-main); }
    .period-badge { background: var(--bg-card); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 6px; font-size: 13px; color: var(--text-muted); }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* BRIEFING EXPLICATIVO (TEXTO DO TOPO) */
    .summary-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--meta-color);
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 32px;
      line-height: 1.6;
      font-size: 15px;
      color: #e5e7eb;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--meta-color); border-radius: 2px; }

    /* GRIDS DE METRICAS */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card-metric { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; position: relative; }
    .card-metric .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
    .card-metric .value { font-size: 26px; font-weight: 700; color: #fff; }
    .card-metric .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* PÚBLICO */
    .demographics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    @media (max-width: 600px) { .demographics-grid { grid-template-columns: 1fr; } }
    .card-demo { background: var(--bg-card); border: 1px solid var(--border-color); padding: 24px; border-radius: 8px; display: flex; align-items: center; gap: 20px; }
    .demo-icon { font-size: 32px; color: var(--text-muted); background: #141419; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .demo-info { flex-grow: 1; }
    .demo-progress { background: #141419; height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .demo-bar { height: 100%; background: var(--meta-color); border-radius: 3px; }

    /* TABELA DE PERFORMANCE DE CRIATIVOS */
    .table-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; overflow-x: auto; margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; min-width: 600px; }
    th { background: #0d0d11; padding: 14px 20px; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
    td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); color: #fff; }
    tr:last-child td { border-bottom: none; }
    .creative-name { font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .badge-best { background: rgba(16, 185, 129, 0.15); color: #10b981; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }

    /* LISTAS DE INSIGHTS (O QUE FUNCIONOU / ATENÇÃO) */
    .insight-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-bottom: 16px; display: flex; gap: 14px; align-items: flex-start; }
    .insight-card.success { border-left: 4px solid #10b981; }
    .insight-card.warning { border-left: 4px solid var(--google-color); }
    .insight-card i { font-size: 20px; margin-top: 2px; }
    .insight-card.success i { color: #10b981; }
    .insight-card.warning i { color: var(--google-color); }
    .insight-text { font-size: 14px; line-height: 1.5; color: #e5e7eb; }
  </style>
