<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="media/TracoD_New_Interno_Prancheta%201%20c%c3%b3pia%2012.png">
  <title>Performance de Campanhas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
  <style>
    :root {
      --bg-main: #f9fafb;
      --bg-card: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --accent: #6366f1; /* Roxo/Azul do modelo */
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); padding: 24px; }

    /* CABEÇALHO */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; background: white; padding: 16px; border-radius: 12px; box-shadow: var(--shadow); }
    .header img { height: 28px; }
    .header h1 { font-size: 18px; font-weight: 700; border-left: 2px solid #e5e7eb; padding-left: 12px; }

    .container { max-width: 1200px; margin: 0 auto; }

    /* CARDS ESTILO MODELO */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 24px; }
    .card { background: var(--bg-card); padding: 24px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid #f3f4f6; }
    .card-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 800; color: #111827; }

    /* TABELA */
    .table-card { background: var(--bg-card); padding: 24px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid #f3f4f6; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { text-align: left; color: var(--text-muted); font-size: 12px; padding: 12px; border-bottom: 1px solid #f3f4f6; }
    td { padding: 16px 12px; border-bottom: 1px solid #f3f4f6; font-weight: 500; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="media/TracoD_New_Interno_Prancheta%201%20c%c3%b3pia%2012.png" alt="Logo">
      <h1>Performance de Campanhas</h1>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-label">Investimento Total</div>
        <div class="card-value" id="m-investimento">R$ 0</div>
      </div>
      <div class="card">
        <div class="card-label">Conversas</div>
        <div class="card-value" id="m-conversas">0</div>
      </div>
      <div class="card">
        <div class="card-label">Custo por Conv.</div>
        <div class="card-value" id="m-cpc">R$ 0,00</div>
      </div>
    </div>

    <div class="table-card">
      <h2 style="font-size: 16px;">Performance dos Criativos</h2>
      <table>
        <thead><tr><th>ANÚNCIO</th><th>CONVERSAS</th><th>CUSTO</th></tr></thead>
        <tbody id="creatives-list"></tbody>
      </table>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
